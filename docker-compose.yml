services:
  # --- STEP 1: Data Preparation ---
  ## 1.1: extract the frames from each camera
  extract:
    build: .
    container_name: zed_extractor
    command: python3 extract_frames.py
    volumes:
      - ./data:/VP_AR_full_System_dockerized/data
      - ./extract_frames.py:/VP_AR_full_System_dockerized/extract_frames.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # # 1.2: sync the frames across both cameras
  sync:
    build: .
    container_name: zed_syncer
    command: python3 sync_frames.py
    volumes:
      - ./data:/VP_AR_full_System_dockerized/data
      - ./sync_frames.py:/VP_AR_full_System_dockerized/sync_frames.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  
  # 1.3: smooth the nonlinear DTW mapping to fix capture jitter
  smooth:
    build: .
    container_name: zed_smoother
    command: python3 smooth_frames_mapping.py
    volumes:
      - ./data:/VP_AR_full_System_dockerized/data
      - ./smooth_frames_mapping.py:/VP_AR_full_System_dockerized/smooth_frames_mapping.py
      # Run the comparison script as a sanity check to generate the comparison text file in data/
      - ./compare_mappings.py:/VP_AR_full_System_dockerized/compare_mappings.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  
  # 1.4: Compile the matched frames into a clean synced dataset
  compile:
    build: .
    container_name: zed_compiler
    command: python3 compile_dataset.py
    volumes:
      - ./data:/VP_AR_full_System_dockerized/data
      - ./compile_dataset.py:/VP_AR_full_System_dockerized/compile_dataset.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

   # --- STEP 2: PRE-PROCESSING (SIGNAL CONDITIONING) ---
  ## 2.1: Normalize, downsample, and convert to PyTorch tensors
  preprocess:
    build: .
    container_name: zed_preprocessor
    command: python3 preprocess_tensors.py
    volumes:
      - ./data:/VP_AR_full_System_dockerized/data
      - ./preprocess_tensors.py:/VP_AR_full_System_dockerized/preprocess_tensors.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
              
